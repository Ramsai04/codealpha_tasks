<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

/* Filter Buttons */
.filters{
    text-align:center;
    margin-bottom:20px;
}

.filters button{
    padding:10px 20px;
    margin:5px;
    border:none;
    cursor:pointer;
    background:#333;
    color:white;
    border-radius:5px;
    transition:0.3s;
}

.filters button:hover,
.filters button.active{
    background:#ff5722;
}

/* Gallery Grid */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery-item{
    overflow:hidden;
    border-radius:10px;
}

.gallery-item img{
    width:100%;
    display:block;
    cursor:pointer;
    transition:transform 0.5s ease, filter 0.5s ease;
}

/* Hover Effect */
.gallery-item:hover img{
    transform:scale(1.1);
    filter:brightness(80%);
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.lightbox-img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:white;
    cursor:pointer;
}

.prev,
.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,0.2);
    color:white;
    border:none;
    padding:15px;
    font-size:25px;
    cursor:pointer;
    border-radius:50%;
}

.prev{
    left:40px;
}

.next{
    right:40px;
}

.prev:hover,
.next:hover{
    background:rgba(255,255,255,0.4);
}

/* Mobile */
@media(max-width:768px){

    .lightbox-img{
        max-width:95%;
    }

    .prev,
    .next{
        padding:10px;
        font-size:20px;
    }
}


</style>
</head>
<body>

    <h1>Responsive Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="nature">Nature</button>
        <button data-filter="city">City</button>
        <button data-filter="animals">Animals</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <div class="gallery-item nature">
            <img src="https://picsum.photos/id/1015/600/400" alt="">
        </div>

        <div class="gallery-item city">
            <img src="https://picsum.photos/id/1011/600/400" alt="">
        </div>

        <div class="gallery-item animals">
            <img src="https://picsum.photos/id/1025/600/400" alt="">
        </div>

        <div class="gallery-item nature">
            <img src="https://picsum.photos/id/1043/600/400" alt="">
        </div>

        <div class="gallery-item city">
            <img src="https://picsum.photos/id/1031/600/400" alt="">
        </div>

        <div class="gallery-item animals">
            <img src="https://picsum.photos/id/237/600/400" alt="">
        </div>

    </div>

    <!-- Lightbox -->
    <div class="lightbox">
        <span class="close">&times;</span>

        <button class="prev">&#10094;</button>

        <img class="lightbox-img" src="" alt="">

        <button class="next">&#10095;</button>
    </div>

    <script>
const images = document.querySelectorAll(".gallery-item img");
const lightbox = document.querySelector(".lightbox");
const lightboxImg = document.querySelector(".lightbox-img");

const closeBtn = document.querySelector(".close");
const nextBtn = document.querySelector(".next");
const prevBtn = document.querySelector(".prev");

let currentIndex = 0;

// Open Lightbox
images.forEach((img, index) => {
    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "flex";
    });
});

function showImage() {
    lightboxImg.src = images[currentIndex].src;
}

// Close
closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
});

// Next
nextBtn.addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
});

// Previous
prevBtn.addEventListener("click", () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
});

// Close when clicking outside image
lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
        lightbox.style.display = "none";
    }
});

/* Category Filters */
const filterButtons = document.querySelectorAll(".filters button");
const galleryItems = document.querySelectorAll(".gallery-item");

filterButtons.forEach(button => {

    button.addEventListener("click", () => {

        filterButtons.forEach(btn =>
            btn.classList.remove("active")
        );

        button.classList.add("active");

        const filter = button.dataset.filter;

        galleryItems.forEach(item => {

            if (
                filter === "all" ||
                item.classList.contains(filter)
            ) {
                item.style.display = "block";
            } else {
                item.style.display = "none";
            }
        });
    });
});</script>
</body>
</html>
